name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add auto version to css/js
        run: |
          HASH=$(git rev-parse --short HEAD)

          find . -name "*.html" -type f | while read file
          do
            sed -i "s|\\.css\"|.css?v=$HASH\"|g" "$file"
            sed -i "s|\\.js\"|.js?v=$HASH\"|g" "$file"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4